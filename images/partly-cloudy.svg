<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80" aria-label="Partly cloudy">
  <!-- Sun -->
  <circle cx="38" cy="38" r="16" fill="#F5A623" opacity="0.95"/>
  <!-- Sun rays -->
  <g stroke="#F5A623" stroke-width="3" stroke-linecap="round">
    <line x1="38" y1="16" x2="38" y2="10"/>
    <line x1="38" y1="60" x2="38" y2="66"/>
    <line x1="16" y1="38" x2="10" y2="38"/>
    <line x1="60" y1="38" x2="66" y2="38"/>
    <line x1="23" y1="23" x2="19" y2="19"/>
    <line x1="53" y1="53" x2="57" y2="57"/>
    <line x1="53" y1="23" x2="57" y2="19"/>
    <line x1="23" y1="53" x2="19" y2="57"/>
  </g>
  <!-- Cloud shadow -->
  <ellipse cx="58" cy="67" rx="26" ry="17" fill="#b0bec5" opacity="0.4"/>
  <!-- Main cloud -->
  <ellipse cx="56" cy="65" rx="26" ry="17" fill="#eceff1"/>
  <circle cx="40" cy="62" r="12" fill="#eceff1"/>
  <circle cx="60" cy="58" r="14" fill="#eceff1"/>
  <circle cx="72" cy="64" r="10" fill="#eceff1"/>
  <!-- Cloud outline -->
  <path d="M30 75 Q28 60 40 55 Q44 44 56 46 Q66 42 72 50 Q82 50 82 62 Q88 72 76 76 Z"
        fill="none" stroke="#90a4ae" stroke-width="1.2"/>
</svg>
